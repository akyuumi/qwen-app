<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwen Local Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="pane chat-pane" aria-label="チャット">
        <header class="pane-header">
          <div>
            <h1>Qwen Local Agent</h1>
            <p id="status">API確認中</p>
          </div>
          <button id="refresh-history" type="button">履歴更新</button>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="chat-input"
            name="text"
            rows="4"
            placeholder="依頼を入力"
            required
          ></textarea>
          <button type="submit">送信</button>
        </form>
      </section>

      <aside class="pane side-pane" aria-label="ツールと設定">
        <section class="tool-section">
          <h2>Python実行</h2>
          <textarea id="code-input" rows="9">print("hello from docker")</textarea>
          <button id="run-code" type="button">Dockerで実行</button>
          <pre id="run-output" class="output"></pre>
        </section>

        <section class="tool-section">
          <h2>プロファイル</h2>
          <form id="profile-form" class="profile-form">
            <label>
              Model
              <input id="profile-model" name="model" autocomplete="off" />
            </label>
            <label>
              Ollama URL
              <input id="profile-url" name="ollama_base_url" autocomplete="off" />
            </label>
            <label>
              System Prompt
              <textarea id="profile-prompt" name="system_prompt" rows="7"></textarea>
            </label>
            <button type="submit">保存</button>
          </form>
        </section>

        <section class="tool-section history-section">
          <h2>実行履歴</h2>
          <div id="history" class="history"></div>
        </section>
      </aside>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
